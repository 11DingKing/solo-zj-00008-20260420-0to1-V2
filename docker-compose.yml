version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: music-player-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: musicplayer
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./database/data.sql:/docker-entrypoint-initdb.d/02-data.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: music-player-backend
    ports:
      - "8080:8080"
    environment:
      DATABASE_URL: postgres://postgres:postgres@db:5432/musicplayer?sslmode=disable
      PORT: 8080
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: music-player-frontend
    ports:
      - "3000:3000"
    environment:
      NUXT_API_BASE: http://backend:8080/api
      NUXT_PUBLIC_API_BASE: http://localhost:8080/api
    depends_on:
      - backend

volumes:
  postgres_data:
